name: Python lint


on:
 push:
  branches: [main]

jobs:
 validate:
   runs-on: ubuntu-latest
   steps:
    - name: checkout code
      uses: actions/checkout@v4

   steps:
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with: 
       python-version: "3.12"

    - name: install libraries & dependencies
      run: pip install -r requirements.txt

    - name: run linter 
      run: flake8 app.py
        
