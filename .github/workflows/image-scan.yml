name: Image Scan

on:
  workflow_call:

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          severity: 'CRITICAL'
          exit-code: '1'